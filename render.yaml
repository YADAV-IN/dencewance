services:
  - type: web
    name: alok-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: APPWRITE_ENDPOINT
        value: "https://nyc.cloud.appwrite.io/v1"
      - key: APPWRITE_PROJECT_ID
        value: "69d60fbe002bae1e32d5"
      - key: APPWRITE_DB_ID
        value: "69d60fe8000c9bd92750"
      - key: APPWRITE_API_KEY
        sync: false
      - key: APPWRITE_STORAGE_BUCKET_ID
        sync: false
      - key: JWT_SECRET
        value: "your-secret-key-change-in-production"
      - key: PORT
        value: "3001"
      - key: NODE_VERSION
        value: "20.10.0"

  - type: web
    name: alok-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: .
    autoDeploy: true
    envVars:
      - key: VITE_APPWRITE_ENDPOINT
        value: "https://nyc.cloud.appwrite.io/v1"
      - key: VITE_APPWRITE_PROJECT_ID
        value: "69d60fbe002bae1e32d5"
      - key: VITE_API_URL
        fromService:
          type: web
          name: alok-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_VERSION
        value: "20.10.0"
