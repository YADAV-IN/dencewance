services:
  - type: web
    name: alok-proxy
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node appwrite-proxy.js
    plan: free
    autoDeploy: true
    envVars:
      - key: VITE_APPWRITE_ENDPOINT
        value: "https://nyc.cloud.appwrite.io/v1"
      - key: VITE_APPWRITE_PROJECT_ID
        value: "69d60fbe002bae1e32d5"
      - key: PORT
        value: "3001"

  - type: web
    name: alok-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_APPWRITE_ENDPOINT
        fromService:
          type: web
          name: alok-proxy
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_APPWRITE_PROJECT_ID
        value: "69d60fbe002bae1e32d5"
      - key: VITE_API_URL
        fromService:
          type: web
          name: alok-proxy
          envVarKey: RENDER_EXTERNAL_URL
